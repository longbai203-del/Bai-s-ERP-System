<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆角矩形 -->
  <rect width="200" height="200" rx="40" fill="url(#grad)"/>
  
  <!-- 图表柱状图图标 -->
  <rect x="45" y="110" width="22" height="55" rx="4" fill="white" opacity="0.9"/>
  <rect x="75" y="80" width="22" height="85" rx="4" fill="white" opacity="0.9"/>
  <rect x="105" y="60" width="22" height="105" rx="4" fill="white" opacity="0.9"/>
  <rect x="135" y="95" width="22" height="70" rx="4" fill="white" opacity="0.9"/>
  
  <!-- 底部横线 -->
  <line x1="35" y1="170" x2="165" y2="170" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  
  <!-- ERP 文字 -->
  <text x="100" y="195" font-size="16" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" letter-spacing="2">ERP</text>
</svg>