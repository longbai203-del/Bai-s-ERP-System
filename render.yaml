services:
  - type: web
    name: bais-erp-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node api/index.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health