# Bai's ERP Backend - Render 部署配置
services:
  - type: web
    name: bais-erp-backend
    runtime: node
    repo: https://github.com/longbai203-del/Bai-s-ERP-System
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://bai-s-erp-system.vercel.app